# um30-spec — five sequential, gated stages: build -> test_scan ->
# containerize -> migrate -> deploy -> zap_scan. SAST is Semgrep, not
# CodeQL (deviation, codebase wins — Semgrep was already established here
# in um01; no CodeQL extension is installed on this org). Promotion across
# environments (dev -> staging -> prod) is gated by Azure DevOps Environment
# approvals on the `deploy` stage's `environment:` — configured in the
# Azure DevOps project UI, not in this file.
#
# Required service connections / variable groups (created once in the Azure
# DevOps project, not in source control):
#   - Azure Resource Manager service connection: "azure-service-connection"
#   - Variable group "um30-infra" (non-secret, per environment): ACR_NAME,
#     RESOURCE_GROUP, CONTAINERAPP_NAME, CONTAINERAPP_JOB_NAME,
#     CONTAINER_APPS_ENV, KEYVAULT_NAME, APP_MI_RESOURCE_ID,
#     MIGRATE_MI_RESOURCE_ID, STAGING_FQDN.
trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

resources:
  containers:
    # Postgres 16 service for the um02 DB migration integration suite
    # (tests/db/migration.integration.test.ts) — see vitest.integration.config.ts.
    - container: postgres
      image: postgres:16
      env:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: enterprise_billing
      ports:
        - 5432:5432

variables:
  - group: um30-infra
  - name: imageRepository
    value: enterprise-billing-app

stages:
  # ---------------------------------------------------------------------
  - stage: build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: build
        displayName: Type check, lint, format, env-schema smoke
        steps:
          - task: UseNode@1
            inputs:
              version: "22.x"
            displayName: Use Node 22

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: $(Pipeline.Workspace)/.npm
            displayName: Cache npm packages

          - script: npm ci --cache $(Pipeline.Workspace)/.npm
            displayName: Install dependencies

          - script: npm run typecheck
            displayName: Type check (tsc --noEmit)

          - script: npm run lint
            displayName: Lint (ESLint incl. import boundaries)

          - script: npm run format:check
            displayName: Format check (Prettier)

          - script: npm run validate:env
            displayName: Zod env-schema smoke (lib/config.ts against .env.example)

  # ---------------------------------------------------------------------
  - stage: test_scan
    displayName: Test + SAST
    dependsOn: build
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: test_scan
        displayName: Jest/Vitest + Semgrep SAST
        services:
          postgres: postgres
        variables:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/enterprise_billing
        steps:
          - task: UseNode@1
            inputs:
              version: "22.x"
            displayName: Use Node 22

          - script: npm ci
            displayName: Install dependencies

          - script: |
              for i in $(seq 1 30); do
                if (exec 3<>/dev/tcp/localhost/5432) 2>/dev/null; then
                  echo "Postgres is reachable on localhost:5432."
                  exit 0
                fi
                sleep 1
              done
              echo "Postgres not reachable on localhost:5432 after 30 attempts." >&2
              exit 1
            displayName: Wait for Postgres service

          - script: npm run test
            displayName: Test (Vitest, incl. DB migration integration)

          # SAST — fails (non-zero exit) and blocks containerize on any
          # high/critical finding. `--error` makes Semgrep exit 1 on findings.
          - script: |
              docker run --rm \
                -v "$(System.DefaultWorkingDirectory):/src" \
                returntocorp/semgrep \
                semgrep scan --config p/typescript --config p/javascript --config p/nextjs \
                  --config p/owasp-top-ten --config p/secrets --error /src
            displayName: SAST (Semgrep)

  # ---------------------------------------------------------------------
  - stage: containerize
    displayName: Containerize
    dependsOn: test_scan
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: build_and_push
        displayName: Build image, push to ACR
        steps:
          - script: |
              SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-7)
              TAG="$(Build.BuildId)-$SHORT_SHA"
              echo "Image tag: $TAG"
              echo "##vso[task.setvariable variable=imageTag;isOutput=true]$TAG"
            name: setImageTag
            displayName: Compute image tag (BuildId-gitSHA)

          - task: AzureCLI@2
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                IMAGE="$(ACR_NAME).azurecr.io/$(imageRepository):$(setImageTag.imageTag)"
                # ACR Tasks (az acr build) is blocked on this subscription type,
                # so build on the agent and push instead. Contributor on the RG
                # (inherited by the service connection's SP) grants the push.
                az acr login --name $(ACR_NAME)
                docker build \
                  --build-arg BUILD_VERSION=$(setImageTag.imageTag) \
                  -t "$IMAGE" \
                  .
                docker push "$IMAGE"
            displayName: docker build + push to ACR (agent-side; ACR Tasks unavailable)

  # ---------------------------------------------------------------------
  - stage: migrate
    displayName: Migrate (no traffic shift)
    dependsOn: containerize
    variables:
      imageTag: $[ stageDependencies.containerize.build_and_push.outputs['setImageTag.imageTag'] ]
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: run_migrations
        displayName: Run drizzle-kit migrate as a Container Apps Job
        steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                # lib/config.ts validates the FULL env schema at import, and
                # db/migrate.ts imports it. The Job never serves auth, so
                # BETTER_AUTH_* are inert placeholders here (mirroring the
                # Dockerfile builder stage) — without them the import throws
                # "Invalid environment configuration". DATABASE_URL is re-set so
                # the secretref survives regardless of --set-env-vars semantics.
                az containerapp job update \
                  --name $(CONTAINERAPP_JOB_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --image $(ACR_NAME).azurecr.io/$(imageRepository):$(imageTag) \
                  --set-env-vars \
                    "DATABASE_URL=secretref:pg-connection-string-migrate" \
                    "BETTER_AUTH_SECRET=build_time_placeholder_secret_min_32_chars" \
                    "BETTER_AUTH_URL=http://localhost:3000"

                EXECUTION_NAME=$(az containerapp job start \
                  --name $(CONTAINERAPP_JOB_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --query name -o tsv)

                echo "Migration job execution: $EXECUTION_NAME"

                # Poll for completion, 5-minute timeout (30 x 10s).
                for i in $(seq 1 30); do
                  STATUS=$(az containerapp job execution show \
                    --name $(CONTAINERAPP_JOB_NAME) \
                    --resource-group $(RESOURCE_GROUP) \
                    --job-execution-name "$EXECUTION_NAME" \
                    --query properties.status -o tsv)
                  echo "Status: $STATUS"
                  if [ "$STATUS" = "Succeeded" ]; then
                    exit 0
                  fi
                  if [ "$STATUS" = "Failed" ]; then
                    echo "Migration job failed — blocking deploy. App still serves the previous image."
                    exit 1
                  fi
                  sleep 10
                done

                echo "Migration job timed out after 5 minutes."
                exit 1
            displayName: Run app_migrate Container Apps Job (DATABASE_URL via Key Vault)

  # ---------------------------------------------------------------------
  - stage: deploy
    displayName: Deploy (blue-green)
    # Must depend on `containerize` directly, not just transitively via `migrate`:
    # stageDependencies only exposes output variables from stages listed in
    # dependsOn. Without `containerize` here, `imageTag` resolves empty and the
    # deploy fails with "argument --revision-suffix: expected one argument".
    dependsOn:
      - containerize
      - migrate
    variables:
      imageTag: $[ stageDependencies.containerize.build_and_push.outputs['setImageTag.imageTag'] ]
    pool:
      vmImage: ubuntu-latest
    jobs:
      - deployment: deploy_dev
        displayName: Deploy to dev
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail

                      # 1. New revision at 0% traffic.
                      az containerapp update \
                        --name $(CONTAINERAPP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(ACR_NAME).azurecr.io/$(imageRepository):$(imageTag) \
                        --revision-suffix $(imageTag) \
                        --set-env-vars \
                          "DATABASE_URL=secretref:pg-connection-string-app" \
                          "BETTER_AUTH_SECRET=secretref:better-auth-secret" \
                          "MICROSOFT_CLIENT_SECRET=secretref:microsoft-client-secret"

                      # No explicit "new revision to 0%" step: in multiple-revision
                      # mode `az containerapp update` already creates the new
                      # revision at 0% and preserves the previous revision's weight.
                      # `traffic set --revision-weight latest=0` REPLACES the whole
                      # traffic map with just {latest:0} (sum 0) → fails with
                      # ContainerAppTrafficWeightIncorrectValue. The new revision is
                      # smoke-tested via its own FQDN below, then promoted to 100% —
                      # the only traffic write needed, which also heals any prior
                      # weight state.

                      # Revision list order is not guaranteed newest-first;
                      # sort by createdTime and take the most recent.
                      NEW_REVISION=$(az containerapp revision list \
                        --name $(CONTAINERAPP_NAME) \
                        --resource-group $(RESOURCE_GROUP) \
                        --query "sort_by(@, &properties.createdTime)[-1].name" -o tsv)

                      # 2. Readiness gate via the revision's healthState — the
                      #    authoritative signal from its readiness probe (internal
                      #    GET /api/health on the container). An external curl can't
                      #    be used: the app's ingress may enforce an IP allowlist
                      #    (ipSecurityRestrictions) that 403s the hosted agent, and
                      #    the probe runs inside the environment, bypassing ingress.
                      #    Poll up to ~3 min; fail fast if the revision goes Failed.
                      SMOKE_OK=false
                      for i in $(seq 1 18); do
                        HEALTH=$(az containerapp revision show \
                          --name $(CONTAINERAPP_NAME) \
                          --resource-group $(RESOURCE_GROUP) \
                          --revision "$NEW_REVISION" \
                          --query "properties.healthState" -o tsv)
                        RUNNING=$(az containerapp revision show \
                          --name $(CONTAINERAPP_NAME) \
                          --resource-group $(RESOURCE_GROUP) \
                          --revision "$NEW_REVISION" \
                          --query "properties.runningState" -o tsv)
                        echo "attempt $i: health=$HEALTH running=$RUNNING"
                        if [ "$HEALTH" = "Healthy" ]; then
                          SMOKE_OK=true
                          break
                        fi
                        if [ "$RUNNING" = "Failed" ]; then
                          echo "New revision entered Failed state."
                          break
                        fi
                        sleep 10
                      done

                      # 3/4. Shift traffic only on success; otherwise leave the
                      # previous revision at 100% and fail the stage.
                      if [ "$SMOKE_OK" = true ]; then
                        az containerapp ingress traffic set \
                          --name $(CONTAINERAPP_NAME) \
                          --resource-group $(RESOURCE_GROUP) \
                          --revision-weight "$NEW_REVISION=100"
                      else
                        echo "Smoke test failed — leaving previous revision at 100% traffic."
                        exit 1
                      fi
                  displayName: Create revision, migrate-gated smoke test, traffic shift

  # ---------------------------------------------------------------------
  - template: zap-scan-stage.yml
