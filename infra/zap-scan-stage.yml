# um30-spec §"5. OWASP ZAP DAST stage". Stages template included by
# infra/azure-pipelines.yml via `- template: zap-scan-stage.yml` directly
# under the parent's `stages:` list. A stages template must declare its own
# top-level `stages:` key — Azure Pipelines splices these entries into the
# parent's stage list. (A bare top-level sequence raises "A sequence was not
# expected" during template expansion.) Runs against the dev/staging revision
# deployed by the `deploy` stage — never against production. High/critical
# findings fail this stage, which blocks the staging -> prod promotion gate;
# medium and below are reported but do not block.
stages:
  - stage: zap_scan
    displayName: OWASP ZAP DAST
    dependsOn: deploy
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: zap_baseline
        displayName: ZAP Baseline Scan
        steps:
          - script: |
              set -euo pipefail
              # zap-context.xml ships with literal placeholder tokens; substitute
              # the real FQDN + seeded test credentials before the scan so scope
              # matching and authenticated crawling work.
              envsubst < infra/zap/zap-context.xml > infra/zap/zap-context.rendered.xml
            displayName: Render ZAP context (substitute FQDN + test credentials)
            env:
              STAGING_FQDN: $(STAGING_FQDN)
              ZAP_TEST_USER_EMAIL: $(ZAP_TEST_USER_EMAIL)
              ZAP_TEST_USER_PASSWORD: $(ZAP_TEST_USER_PASSWORD)

          - script: |
              mkdir -p $(System.DefaultWorkingDirectory)/zap-out
              # ZAP runs as uid 1000 (the `zap` user) inside the container, but the
              # agent-created zap-out dir is owned by a different uid, so the report
              # write fails: "Permission denied: /zap/wrk/out/zap-report.html".
              # Make the mounted output dir world-writable.
              chmod 777 $(System.DefaultWorkingDirectory)/zap-out
              docker run --rm \
                -v "$(System.DefaultWorkingDirectory)/infra/zap:/zap/wrk" \
                -v "$(System.DefaultWorkingDirectory)/zap-out:/zap/wrk/out" \
                ghcr.io/zaproxy/zaproxy:stable \
                zap-baseline.py \
                  -t https://$(STAGING_FQDN) \
                  -x out/zap-report.xml \
                  -r out/zap-report.html \
                  -n /zap/wrk/zap-context.rendered.xml \
                  -c /zap/wrk/rules.tsv \
                  -I
            displayName: Run ZAP baseline scan against $(STAGING_FQDN)

          - script: |
              REPORT="$(System.DefaultWorkingDirectory)/zap-out/zap-report.xml"
              # riskcode 3 = High, 4 = Critical. Any match fails the stage.
              if grep -E '<riskcode>(3|4)</riskcode>' "$REPORT" > /dev/null; then
                echo "ZAP found one or more High/Critical findings — failing the stage."
                exit 1
              fi
              echo "No High/Critical ZAP findings."
            displayName: Gate on High/Critical findings

          - task: CopyFiles@2
            condition: succeededOrFailed()
            inputs:
              sourceFolder: $(System.DefaultWorkingDirectory)/zap-out
              contents: "**"
              targetFolder: $(Build.ArtifactStagingDirectory)/zap
            displayName: Stage ZAP reports

          - task: PublishBuildArtifacts@1
            condition: succeededOrFailed()
            # Don't let a missing-reports publish mask the real failure: if the
            # scan dies before writing reports, the gate step already fails the
            # stage — a "PathtoPublish not found" error here would just add noise.
            continueOnError: true
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/zap
              artifactName: zap-reports
            displayName: Publish ZAP HTML + XML reports
